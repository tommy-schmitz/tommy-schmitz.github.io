function gaussianRandom(mean = 0, stdev = 1) {
  let u1, u2, r;
  do {
    u1 = 2 * Math.random() - 1; // Range: -1 to 1
    u2 = 2 * Math.random() - 1; // Range: -1 to 1
    r = u1 * u1 + u2 * u2;
  } while (r === 0 || r >= 1); // Reject points outside the unit circle
  const c = Math.sqrt(-2 * Math.log(r) / r);
  return u1 * c * stdev + mean;
}

const basic_parsing = () => {
  const c = parseFloat(document.getElementById('c').value);
  const l = parseFloat(document.getElementById('l').value);
  const aPrime = parseFloat(document.getElementById('aprime').value);

  if([c, l, aPrime].some(isNaN))
    throw "Error: All inputs must be valid numbers.";
  if(c <= 0)
    throw "Error: Consumption must be positive.";
  if(l < 0 || l > 1)
    throw "Error: Labor hours must be from 0 to 1 (inclusive).";
  if(aPrime < 0)
    throw "Error: Next assets cannot be negative.";

  return {c, l, aPrime};
};

const calculations = () => {
  const {c, l, aPrime} = basic_parsing();

  const isRetired = (period >= JR);

  if(isRetired && l > 0)
    throw 'Error: You are retired. You can no longer work.';

  const effectiveL = getEffectiveLabor(l);

  const income = (() => {
    if(isRetired) {
      const social_security = b_SS * AE(period);
      return social_security;
    } else {
      const earnings = w * Math.exp(productivity + theta) * humanCapital * effectiveL;
      return earnings;
    }
  })();

  const interest = r * assets;
  const childcare_costs = compute_childcare_costs({j: period, k});

  const resources = assets + interest + income - childcare_costs;

  const impliedConsumption = resources - aPrime;
  const implied_new_assets = resources - c;

  if(Math.abs(impliedConsumption - c) > 0.005)
    throw (`Error: Your chosen c and a' are not consistent. Change c to ${impliedConsumption.toFixed(2)} or `
          +`change a' to ${implied_new_assets.toFixed(2)}`);

  const u = utility(c, l);

  const new_human_capital = (() => {
    if(l > l_bar) {
      return humanCapital * Math.exp(nu_1 - nu_2 * period);
    } else {
      return humanCapital * Math.exp(-delta_h);
    }
  })();

  const new_productivity = rho * productivity + gaussianRandom(0, epsilon_stddev);

  return {c, l, aPrime, income, u, new_human_capital, new_productivity, interest, childcare_costs};
};

};

const number_of_children = ({j, k}) => {

  if(j <= 12)

  if(j <= 27)

  if(j <= 30)

  return 0;

const compute_childcare_costs = ({j, k}) => {
  if(k === 0)
    return 0;
  if(j >= 7  &&  j <= 15)  // During these years, the agent has exactly one child of age 0 or 1 or 2.
    return eta;
  return 0;

function utility(c, l) {
  if (c <= 0) return -Infinity;
  const consumptionUtility = Math.log(c);
  const laborDisutility = phi * Math.pow(l, 1 + 1/gamma) / (1 + 1/gamma);
  return consumptionUtility - laborDisutility;
}

function getEffectiveLabor(l) {
  return Math.max(0, l - l_bar);
}
